<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="gridGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <!-- Maskable-safe background (full bleed) -->
  <rect width="512" height="512" fill="#08080d"/>
  <rect width="512" height="512" fill="url(#gridGlow)"/>
  <!-- Decorative word-search grid hints -->
  <g fill="#ffffff" fill-opacity="0.06" font-family="system-ui, sans-serif" font-weight="700" font-size="28">
    <text x="72" y="108">W</text>
    <text x="128" y="108">O</text>
    <text x="184" y="108">R</text>
    <text x="240" y="108">D</text>
    <text x="72" y="404">S</text>
    <text x="128" y="404">E</text>
    <text x="184" y="404">E</text>
    <text x="240" y="404">K</text>
    <text x="328" y="108">F</text>
    <text x="384" y="108">I</text>
    <text x="440" y="108">N</text>
    <text x="328" y="404">D</text>
    <text x="384" y="404">!</text>
  </g>
  <!-- Highlight lines (found-word paths) -->
  <line x1="68" y1="96" x2="252" y2="96" stroke="url(#brand)" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <line x1="320" y1="392" x2="420" y2="392" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  <!-- Center mark -->
  <circle cx="256" cy="256" r="118" fill="#111118" stroke="url(#brand)" stroke-width="4"/>
  <text x="256" y="302" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="148" font-weight="800" fill="url(#brand)" text-anchor="middle">W</text>
</svg>